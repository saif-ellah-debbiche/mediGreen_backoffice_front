<!-- Mobile Menu Toggle -->
<button
  (click)="toggleMenu()"
  class="md:hidden fixed top-4 left-4 z-50 p-2 rounded-lg bg-green-600 text-white text-2xl border-none cursor-pointer transition-all hover:bg-green-700"
>
  <span>☰</span>
</button>

<!-- Sidebar -->
<aside
  class="w-64 bg-white text-gray-900 border-r border-gray-200 flex flex-col h-screen overflow-hidden
         fixed left-0 top-0 z-40 transition-transform duration-300
         -translate-x-full md:translate-x-0 md:relative md:shadow-none"
  [class.translate-x-0]="isOpen"
  [class.-translate-x-full]="!isOpen"
  [class.shadow-xl]="isOpen"
>

  <!-- Logo Section -->
  <div class="p-6 border-b border-gray-200 flex items-center gap-3">
    <div class="w-10 h-10 rounded-full bg-green-600 text-white flex items-center justify-content text-lg font-bold">
      🌿
    </div>
    <div>
      <h1 class="text-xl font-bold text-gray-900">MediGreen</h1>
      <p class="text-xs text-gray-600 mt-0.5">
        {{ language?.() === 'en' ? 'Medical Plants Admin' : 'إدارة النباتات الطبية' }}
      </p>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto p-4 space-y-6">
    <div *ngFor="let section of navSections">

      <!-- Section Title -->
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider px-2 mb-2">
        {{ getSectionTitle(section.title, section.titleAr) }}
      </p>

      <!-- Navigation Items -->
      <div class="space-y-1">
        <button
          *ngFor="let item of section.items"
          (click)="navigate(item.href)"
          class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 text-sm font-medium cursor-pointer transition-all border-none bg-transparent hover:bg-green-50"
        >
          <span class="text-lg">{{ getIcon(item.icon) }}</span>
          <span class="flex-1 text-left">{{ getLabel(item) }}</span>
          <span
            *ngIf="item.badge"
            class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-xs font-semibold"
          >
            {{ item.badge }}
          </span>
        </button>
      </div>

    </div>
  </nav>

  <!-- Sidebar Footer -->
  <div class="p-4 border-t border-gray-200 space-y-2">

    <!-- language?.() Toggle -->
    <div class="flex gap-2 mb-2">
      <button
        (click)="setLanguage('en')"
        class="flex-1 py-2 px-3 rounded-lg text-sm font-semibold cursor-pointer border border-gray-300 transition-all"
        [class.bg-green-600]="isLanguageActive('en')"
        [class.text-white]="isLanguageActive('en')"
        [class.border-green-600]="isLanguageActive('en')"
        [class.bg-gray-100]="!isLanguageActive('en')"
        [class.text-gray-700]="!isLanguageActive('en')"
      >
        English
      </button>
      <button
        (click)="setLanguage('ar')"
        class="flex-1 py-2 px-3 rounded-lg text-sm font-semibold cursor-pointer border border-gray-300 transition-all"
        [class.bg-green-600]="isLanguageActive('ar')"
        [class.text-white]="isLanguageActive('ar')"
        [class.border-green-600]="isLanguageActive('ar')"
        [class.bg-gray-100]="!isLanguageActive('ar')"
        [class.text-gray-700]="!isLanguageActive('ar')"
      >
        العربية
      </button>
    </div>

    <!-- Logout -->
    <button
      class="w-full px-4 py-3 rounded-lg text-gray-700 text-sm font-medium cursor-pointer border-none bg-transparent transition-all hover:bg-gray-100 flex items-center gap-3"
    >
      <span>🚪</span>
      {{ language?.() === 'en' ? 'Logout' : 'تسجيل الخروج' }}
    </button>

  </div>
</aside>

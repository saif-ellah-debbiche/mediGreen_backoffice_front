 <div class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none">
      <div
        *ngFor="let toast of toastService.toasts()"
        class="pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg border text-sm font-medium min-w-64 max-w-sm transition-all"
        [class.bg-white]="toast.type === 'success'"
        [class.border-green-200]="toast.type === 'success'"
        [class.text-gray-900]="toast.type === 'success'"
        [class.bg-white]="toast.type === 'error'"
        [class.border-red-200]="toast.type === 'error'"
        [class.text-gray-900]="toast.type === 'error'"
      >
        <!-- Icon -->
        <span
          class="flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold"
          [class.bg-green-100]="toast.type === 'success'"
          [class.text-green-700]="toast.type === 'success'"
          [class.bg-red-100]="toast.type === 'error'"
          [class.text-red-700]="toast.type === 'error'"
        >
          {{ toast.type === 'success' ? '✓' : '✕' }}
        </span>

        <!-- Message -->
        <span class="flex-1">{{ toast.message }}</span>

        <!-- Dismiss -->
        <button
          (click)="toastService.dismiss(toast.id)"
          class="flex-shrink-0 text-gray-400 hover:text-gray-600 border-none bg-transparent cursor-pointer text-base leading-none"
        >
          ✕
        </button>
      </div>
    </div>

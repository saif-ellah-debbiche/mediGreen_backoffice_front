<div
      *ngIf="loadingService.isLoading()"
      class="fixed inset-0 bg-black/40 z-[200] flex items-center justify-center"
    >
      <div class="bg-white rounded-lg border border-gray-200 shadow-sm px-8 py-6 flex flex-col items-center gap-4 min-w-48">

        <!-- Spinner -->
        <span style="
          display: block;
          width: 2rem;
          height: 2rem;
          border: 3px solid #e5e7eb;
          border-top-color: #16a34a;
          border-radius: 50%;
          animation: spin 0.7s linear infinite;
        "></span>

        <!-- Message -->
        <p class="text-sm font-medium text-gray-700 text-center">
          {{ loadingService.message() || 'Please wait...' }}
        </p>

      </div>
    </div>
